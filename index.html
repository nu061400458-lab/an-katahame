<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">


  <title>
    かたちはめゲーム
  </title>


  <link rel="stylesheet"
        href="style.css">

</head>


<body>


<main class="app">


  <!-- =========================
       タイトル
  ========================== -->

  <header class="header">

    <h1>
      かたちはめゲーム
    </h1>


    <p>
      おなじ かたちを はめよう！
    </p>


  </header>





  <!-- =========================
       型枠エリア

       ここに
       ○△□の穴を表示

  ========================== -->


  <section
    id="targetArea"
    class="target-area">


  </section>






  <!-- =========================
       ドラッグする図形エリア

       ここに
       ○△□を表示

  ========================== -->


  <section
    id="pieceArea"
    class="piece-area">


  </section>






  <!-- =========================
       メッセージ

  ========================== -->


  <div
    id="message"
    class="message">

  </div>






  <!-- =========================
       リセット

  ========================== -->


  <button
    id="resetButton"
    class="reset-button">


    もういちど


  </button>



</main>





<script src="script.js"></script>


</body>


</html>
